      <stop stop-color="#26261F"/>
      <stop offset="1" stop-color="#161614"/>
    </linearGradient>
    <linearGradient id="bag" x1="158" y1="200" x2="354" y2="392" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
